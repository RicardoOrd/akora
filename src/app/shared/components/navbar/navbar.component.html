<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar__container">

    <!-- Logo -->
    <a class="navbar__logo" (click)="scrollTo('hero')" role="button" tabindex="0">
      <img src="assets/images/logo.png" alt="Akora Repostería" class="navbar__logo-img" />
    </a>

    <!-- Desktop nav links -->
    <ul class="navbar__links">
      @for (link of navLinks; track link.fragment) {
        <li>
          <button class="navbar__link" (click)="scrollTo(link.fragment)">
            {{ link.label }}
          </button>
        </li>
      }
    </ul>

    <!-- CTA Button -->
    <button class="navbar__cta" (click)="scrollTo('products')">
      Ordenar ahora
    </button>

    <!-- Cart icon (Fase 2+) -->
    <!-- <button class="navbar__cart" routerLink="/cart">
      <span class="material-icons">shopping_bag</span>
      <span class="navbar__cart-badge">0</span>
    </button> -->

    <!-- Hamburger -->
    <button class="navbar__hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen()" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>

  </div>

  <!-- Mobile drawer -->
  <div class="navbar__drawer" [class.open]="isMenuOpen()">
    <ul class="navbar__drawer-links">
      @for (link of navLinks; track link.fragment) {
        <li>
          <button (click)="scrollTo(link.fragment)">{{ link.label }}</button>
        </li>
      }
    </ul>
    <button class="navbar__cta navbar__cta--mobile" (click)="scrollTo('products')">
      Ordenar ahora
    </button>
  </div>
</nav>
