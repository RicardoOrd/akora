<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar__container">

    <!-- Left: Menu button -->
    <button class="navbar__menu-btn" (click)="toggleMenu()" [class.active]="isMenuOpen()" aria-label="Abrir menú">
      <span class="navbar__menu-icon">
        <span></span><span></span><span></span>
      </span>
      <span class="navbar__menu-label">Menú</span>
    </button>

    <!-- Center: Logo -->
    <a class="navbar__logo" (click)="scrollTo('hero')" role="button" tabindex="0">
      <img src="assets/images/logo.png" alt="Akora Repostería" class="navbar__logo-img" />
    </a>

    <!-- Right: CTA Button (temporalmente oculto)
    <button class="navbar__cta" (click)="scrollTo('products')">
      Ordenar Ahora
    </button> -->

  </div>

  <!-- Slide-in drawer (left side) -->
  <div class="navbar__overlay" [class.open]="isMenuOpen()" (click)="toggleMenu()"></div>
  <div class="navbar__drawer" [class.open]="isMenuOpen()">
    <div class="navbar__drawer-header">
      <img src="assets/images/logo.png" alt="Akora" class="navbar__drawer-logo" />
      <button class="navbar__drawer-close" (click)="toggleMenu()" aria-label="Cerrar menú">
        ✕
      </button>
    </div>
    <ul class="navbar__drawer-links">
      @for (link of navLinks; track link.fragment) {
        <li>
          <button (click)="scrollTo(link.fragment)">{{ link.label }}</button>
        </li>
      }
    </ul>
    <button class="navbar__cta navbar__cta--drawer" (click)="scrollTo('products')">
      Ordenar Ahora
    </button>
  </div>
</nav>
