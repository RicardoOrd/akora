<section class="hero" id="hero">

  <!-- Floating decorative particles -->
  <div class="hero__particles" aria-hidden="true">
    <span class="hero__particle hero__particle--1"></span>
    <span class="hero__particle hero__particle--2"></span>
    <span class="hero__particle hero__particle--3"></span>
    <span class="hero__particle hero__particle--4"></span>
    <span class="hero__particle hero__particle--5"></span>
  </div>

  <!-- Content -->
  <div class="hero__content">
    <h1 class="hero__title">
      Cada bocado,<br />
      <span class="hero__title-accent">una experiencia</span>
    </h1>

    <p class="hero__subtitle">
      Postres hechos con amor, ingredientes de calidad<br class="hide-mobile" />
      y una pizca de magia para los momentos que importan.
    </p>

    <div class="hero__actions">
      <button class="hero__btn hero__btn--primary" (click)="scrollToProducts()">
        Ordenar Ahora
      </button>
      <button class="hero__btn hero__btn--ghost" (click)="scrollToProducts()">
        Ver menú ↓
      </button>
    </div>
  </div>

  <!-- Bottom wave separator -->
  <div class="hero__wave" aria-hidden="true">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,80 C360,120 720,40 1080,80 C1260,100 1380,60 1440,80 L1440,120 L0,120 Z" fill="#f7f8fc" />
    </svg>
  </div>

</section>
